<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <title>Cek Data Siswa</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="container">
        <h2>Verifikasi Data Siswa</h2>
        <div class="input-box">
            <label>NISN (10 Digit)</label>
            <input type="text" id="nisn" maxlength="10" placeholder="Contoh: 0126191947" oninput="this.value = this.value.replace(/[^0-9]/g, '')">
        </div>
        <div class="input-box">
            <label>Tanggal Lahir</label>
            <input type="date" id="tgl_lahir">
        </div>
        <button onclick="cariData()">Cari Data</button>
        <div id="hasil"></div>
    </div>
    <script src="script.js"></script>
</body>
</html>
